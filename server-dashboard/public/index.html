<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fisch Server Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1>Fisch Custom Server Dashboard</h1>
          <p>Central management for rod data, catching tuning, and user feedback.</p>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="Toggle color theme"
          aria-pressed="false"
        >
          Dark mode
        </button>
      </div>
      <div id="server-status" class="pill">Checking server...</div>
    </header>

    <nav class="top-nav">
      <button class="nav-btn" data-target="main-menu">Main Menu</button>
      <button class="nav-btn" data-target="rod-overview">Rod Data Overview</button>
      <button class="nav-btn" data-target="feedback-inbox">Feedback Inbox</button>
    </nav>

    <main class="content">
      <section id="main-menu" class="panel">
        <h2>Main Menu Dashboard</h2>
        <div class="card-grid">
          <article class="stat-card">
            <h3>Total Rods</h3>
            <p id="rod-count">-</p>
          </article>
          <article class="stat-card">
            <h3>Feedback Messages</h3>
            <p id="feedback-count">-</p>
          </article>
          <article class="stat-card">
            <h3>Last Refresh</h3>
            <p id="last-refresh">-</p>
          </article>
        </div>
      </section>

      <section id="rod-overview" class="panel">
        <div class="panel-header">
          <h2>Rod Data Overview</h2>
          <button id="reload-rods" class="action-btn">Reload Rod Data</button>
        </div>
        <div class="toolbar">
          <label for="rod-search">Find rod:</label>
          <input id="rod-search" type="text" placeholder="Type to filter tabs..." />
        </div>
        <div class="rod-layout">
          <aside id="rod-tabs" class="rod-tabs"></aside>
          <form id="rod-form" class="rod-form">
            <h3 id="rod-form-title">Select a rod</h3>
            <div class="form-grid">
              <label>Lure
                <input id="field-lure" type="number" step="0.01" />
              </label>
              <label>Luck
                <input id="field-luck" type="number" step="0.01" />
              </label>
              <label>Control
                <input id="field-control" type="number" step="0.01" />
              </label>
              <label>Resilience
                <input id="field-resilience" type="number" step="0.01" />
              </label>
              <label>Max Kg
                <input id="field-maxkg" type="text" placeholder="number or inf" />
              </label>
            </div>
            <h4>Catching Tuning</h4>
            <div class="form-grid">
              <label>Center Ratio
                <input id="field-centerRatio" type="number" step="0.01" />
              </label>
              <label>Lookahead Ms
                <input id="field-lookaheadMs" type="number" step="1" />
              </label>
              <label>Brake Speed
                <input id="field-brakeSpeed" type="number" step="0.01" />
              </label>
              <label>Deadzone Px
                <input id="field-deadzonePx" type="number" step="1" />
              </label>
              <label>Fish Velocity Smoothing
                <input id="field-fishVelocitySmoothing" type="number" step="0.01" />
              </label>
              <label>Bar Velocity Smoothing
                <input id="field-barVelocitySmoothing" type="number" step="0.01" />
              </label>
            </div>
            <label>Notes
              <textarea id="field-notes" rows="4" placeholder="Manual notes for this rod..."></textarea>
            </label>
            <div class="form-actions">
              <button type="submit" class="action-btn">Save Rod Data</button>
              <span id="rod-save-status"></span>
            </div>
          </form>
        </div>
      </section>

      <section id="feedback-inbox" class="panel">
        <div class="panel-header">
          <h2>Feedback Inbox</h2>
          <button id="reload-feedback" class="action-btn">Reload Feedback</button>
        </div>
        <div id="feedback-list" class="feedback-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
